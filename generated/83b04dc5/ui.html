<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root" class="container mx-auto p-5"></div>

    <script type="text/babel">
        const App = () => {
            const [items, setItems] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState(null);
            const [newItem, setNewItem] = React.useState({ name: '', sku: '', quantity: 0 });
            const [sellItemSku, setSellItemSku] = React.useState('');
            const [sellAmount, setSellAmount] = React.useState(1);

            const fetchItems = async () => {
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch('/live/83b04dc5/items');
                    if (!response.ok) throw new Error('Failed to fetch items');
                    const data = await response.json();
                    setItems(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const addItem = async () => {
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch('/live/83b04dc5/items', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newItem),
                    });
                    if (!response.ok) throw new Error('Failed to add item');
                    await response.json();
                    setNewItem({ name: '', sku: '', quantity: 0 });
                    fetchItems();
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const sellItem = async () => {
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch(`/live/83b04dc5/items/${sellItemSku}/sell`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ amount: sellAmount }),
                    });
                    if (!response.ok) throw new Error('Failed to sell item');
                    await response.json();
                    setSellItemSku('');
                    setSellAmount(1);
                    fetchItems();
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            React.useEffect(() => {
                fetchItems();
            }, []);

            return (
                <div>
                    <h1 className="text-2xl font-bold mb-4">Inventory Tracking System</h1>
                    {loading && <p className="text-blue-500">Loading...</p>}
                    {error && <p className="text-red-500">{error}</p>}
                    <div className="mb-4">
                        <h2 className="text-xl">Add New Item</h2>
                        <input
                            type="text"
                            placeholder="Name"
                            value={newItem.name}
                            onChange={(e) => setNewItem({ ...newItem, name: e.target.value })}
                            className="border p-2 mr-2"
                        />
                        <input
                            type="text"
                            placeholder="SKU"
                            value={newItem.sku}
                            onChange={(e) => setNewItem({ ...newItem, sku: e.target.value })}
                            className="border p-2 mr-2"
                        />
                        <input
                            type="number"
                            placeholder="Quantity"
                            value={newItem.quantity}
                            onChange={(e) => setNewItem({ ...newItem, quantity: parseInt(e.target.value) })}
                            className="border p-2 mr-2"
                        />
                        <button onClick={addItem} className="bg-blue-500 text-white p-2">Add Item</button>
                    </div>
                    <div className="mb-4">
                        <h2 className="text-xl">Sell Item</h2>
                        <input
                            type="text"
                            placeholder="SKU"
                            value={sellItemSku}
                            onChange={(e) => setSellItemSku(e.target.value)}
                            className="border p-2 mr-2"
                        />
                        <input
                            type="number"
                            placeholder="Amount"
                            value={sellAmount}
                            onChange={(e) => setSellAmount(parseInt(e.target.value))}
                            className="border p-2 mr-2"
                        />
                        <button onClick={sellItem} className="bg-blue-500 text-white p-2">Sell Item</button>
                    </div>
                    <h2 className="text-xl">Items List</h2>
                    <ul className="border-t border-gray-300">
                        {items.map((item, index) => (
                            <li key={index} className="flex justify-between p-2 border-b border-gray-200">
                                <span>{item.name} (SKU: {item.sku})</span>
                                <span>Quantity: {item.quantity}</span>
                            </li>
                        ))}
                    </ul>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
